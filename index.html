<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
<div class="container">        
    <div class="prompt-container" id="prompt-container">
        <h2>Select Number of Rounds</h2>
        <div class="examples">
            <input type="number" class="input-btn btnborder" id="input-btn" min="1" max="20">
            <button id="go-btn" class="go-button">PLAY</button>
        </div>
        
    </div>
    <div class="btn-container hide" id="item-container">
        <button class="itm btnborder" id="rock">🪨</button>
        <button class="itm btnborder" id="paper">📄</button>
        <button class="itm btnborder" id="scissors">✂️</button>
    </div>
    <div class="score-container">
        <h2 id="instruction" class="hide instruction">Select Rock, Paper or Scissors!</h2>
        <h2 id="round-text" class="hide">Rounds Remaining: <span id="round-count"></span></h2>
        <h1 id="announce-winner"></h1>
        <h2 id="final-score-text" class="hide">Final Score</h2>
        <div id="score-display" class="hide">
            <p>Human: <span id="human-tally">0</span> | Computer: <span id="computer-tally">0</span> | Tie: <span id="tie-tally">0</span> </p>
        </div>
        <button id="replay-button" class="replay hide">Play Again?</button>
    </div>
</div>
    
    <script src="rockpaperscissors.js"></script>
</body>
